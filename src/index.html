<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>NgTrimagix</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- FONT-AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.css" integrity="sha512-GmZYQ9SKTnOea030Tbiat0Y+jhnYLIpsGAe6QTnToi8hI2nNbVMETHeK4wm4MuYMQdrc38x+sX77+kVD01eNsQ==" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <app-root></app-root>

  <script>
    window.addEventListener('scroll', () => {
      let scrollPosition = window.scrollY || document.documentElement.scrollTop;
      
      if(scrollPosition > 0){
        document.getElementById('header-component').classList.add("scrolled");
      } else {
        document.getElementById('header-component').classList.remove("scrolled");
      }
    });
  </script>
</body>
</html>
