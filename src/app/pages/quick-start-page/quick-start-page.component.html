<div id="quick-start-page" class="cl-prim p-3">
    <div data-aos="fade-left" data-aos-easing="ease-out-cubic" data-aos-duration="1000">
        <h5 class="secondary-title">Quick Start</h5>
        <p>This guide will help you create a simple application using ng-trimagix components. By the end, you'll have a working app with basic components and interactions.</p>
    </div>

    <!-- CODE BLOCK LIST -->
    <app-code-block [codeBlocks]="codeBlocks"></app-code-block>

    <div class="ps-4 mt-5">
        <button (click)="generateNumberList()" class="btn btn-neon light round" type="button">
            Generate number list from 5 to 15
        </button>
        <div *ngIf="numberList.length > 0" class="d-flex flex-column">
            <span class="my-2">List generated by the <strong>generateNumberList</strong> function</span>
            <span>{{numberList}}</span>
        </div>
    </div>

</div>
